services:
  # lemonade-server starts with no model loaded. the wrapper script
  # (docker-compose.sh) pulls LEMONADE_MODEL and persists LEMONADE_CTX_SIZE
  # via `lemonade load --save-options` after the service is healthy — that's
  # the single source of truth for model/ctx config, don't add knobs here.
  lemonade:
    image: ghcr.io/lemonade-sdk/lemonade-server:latest
    container_name: lemonade
    ports:
      - "13305:13305"
    volumes:
      - lemonade-cache:/root/.cache/huggingface
    devices:
      - /dev/kfd
      - /dev/dri
    # numeric GIDs, not names: docker resolves names against the container's
    # /etc/group (not the host's), so the names always fail. these are filled
    # in from the host at runtime by docker-compose.sh (or default to common
    # values); override by exporting VIDEO_GID / RENDER_GID before `up`.
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-110}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:13305/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://lemonade:13305/v1
      - OPENAI_API_KEY=local
      - WEBUI_AUTH=False
    depends_on:
      lemonade:
        condition: service_healthy
    restart: unless-stopped

  # OpenHands needs the host docker socket so it can spawn its own per-task
  # agent-server sandbox containers — that's a meaningful trust boundary
  # (the openhands container effectively has root on the host docker daemon).
  # only run this on a workstation you trust.
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.6
    container_name: openhands
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-state:/.openhands
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=1.15.0-python
      - LOG_ALL_EVENTS=true
      # point OpenHands at lemonade via the host loopback (host.docker.internal
      # → host-gateway). lemonade publishes port 13305 on the host, and the
      # per-task sandbox containers OpenHands spawns aren't on the compose
      # network, so they can't reach `lemonade` by name — only the host.
      # LiteLLM appends /chat/completions to LLM_BASE_URL, so the URL must end
      # in /v1. the model id keeps the `openai/` prefix LiteLLM needs to route
      # to the generic OpenAI-compatible client.
      - LLM_BASE_URL=http://host.docker.internal:13305/v1
      - LLM_API_KEY=local
      - LLM_MODEL=openai/Qwen3-Coder-30B-A3B-Instruct-GGUF
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      lemonade:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lemonade-cache:
  open-webui-data:
  openhands-state:
