services:
  lemonade:
    image: ghcr.io/lemonade-sdk/lemonade-server:latest
    container_name: lemonade
    ports:
      - "13305:13305"
    volumes:
      - lemonade-cache:/root/.cache/huggingface
    devices:
      - /dev/kfd
      - /dev/dri
    # numeric GIDs, not names: docker resolves names against the container's
    # /etc/group (not the host's), so the names always fail. confirm with
    # `getent group video` and `getent group render` on the host and adjust.
    group_add:
      - "44"   # video
      - "990"  # render
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:13305/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://lemonade:13305/v1
      - OPENAI_API_KEY=local
      - WEBUI_AUTH=False
    depends_on:
      lemonade:
        condition: service_healthy
    restart: unless-stopped

  agent-tools:
    build: ./agent-tools
    container_name: agent-tools
    volumes:
      - ./workspace:/workspace
      - agent-tools-home:/home/agent
    environment:
      - OPENAI_API_BASE=http://lemonade:13305/v1
      - OPENAI_API_KEY=local
      - OPENAI_MODEL_NAME=Gemma-4-31B-it-GGUF
    tty: true
    stdin_open: true
    depends_on:
      lemonade:
        condition: service_healthy
    command: ["sleep", "infinity"]
    restart: unless-stopped

volumes:
  lemonade-cache:
  open-webui-data:
  agent-tools-home:
