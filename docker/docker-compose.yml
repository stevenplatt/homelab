services:
  lemonade:
    image: ghcr.io/lemonade-sdk/lemonade-server:latest
    container_name: lemonade
    ports:
      - "13305:13305"
    volumes:
      - lemonade-cache:/root/.cache/huggingface
    devices:
      - /dev/kfd
      - /dev/dri
    # numeric GIDs, not names: docker resolves names against the container's
    # /etc/group (not the host's), so the names always fail. these are filled
    # in from the host at runtime by docker-compose.sh (or default to common
    # values); override by exporting VIDEO_GID / RENDER_GID before `up`.
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-110}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:13305/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://lemonade:13305/v1
      - OPENAI_API_KEY=local
      - WEBUI_AUTH=False
    depends_on:
      lemonade:
        condition: service_healthy
    restart: unless-stopped

  agent-tools:
    build: ./agent-tools
    container_name: agent-tools
    # docker.sock is mounted so `agentstack self install` can spawn the
    # AgentStack/BeeAI platform (kind cluster + supporting containers) — same
    # trust pattern as openhands. ports 8333 (UI) and 8334 (API) match the
    # AgentStack defaults; adjust if `agentstack ui` reports a different port.
    ports:
      - "8333:8333"
      - "8334:8334"
    volumes:
      - ./workspace:/workspace
      - agent-tools-home:/home/agent
      - /var/run/docker.sock:/var/run/docker.sock
    # /dev/kvm passthrough: agentstack's lima/qemu-based VM uses KVM accel
    # if available. host needs qemu-kvm installed (handled by ansible).
    devices:
      - /dev/kvm:/dev/kvm
    # add the host's docker group so the non-root agent user can read
    # /var/run/docker.sock. filled in from the host at runtime by
    # docker-compose.sh; override by exporting DOCKER_GID before `up`.
    group_add:
      - "${DOCKER_GID:-999}"
      - "${KVM_GID:-104}"
    environment:
      - OPENAI_API_BASE=http://lemonade:13305/v1
      - OPENAI_API_KEY=local
      - OPENAI_MODEL_NAME=Gemma-4-26B-A4B-it-GGUF
    tty: true
    stdin_open: true
    depends_on:
      lemonade:
        condition: service_healthy
    command: ["sleep", "infinity"]
    restart: unless-stopped

  # CrewAI Studio: streamlit-based no-code GUI for designing & running crews.
  # Built from upstream (strnad/CrewAI-Studio) since there is no first-party
  # pre-built image. Connects to lemonade via the OpenAI-compatible env vars.
  crewai-studio:
    build: https://github.com/strnad/CrewAI-Studio.git
    container_name: crewai-studio
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=local
      - OPENAI_API_BASE=http://lemonade:13305/v1
      # comma-separated list shown in the model dropdown inside Studio
      - OPENAI_PROXY_MODELS=Gemma-4-26B-A4B-it-GGUF
      - DB_URL=postgresql://crewai:crewai@crewai-db:5432/crewai
    depends_on:
      crewai-db:
        condition: service_healthy
      lemonade:
        condition: service_healthy
    restart: unless-stopped

  crewai-db:
    image: postgres:15
    container_name: crewai-db
    environment:
      - POSTGRES_USER=crewai
      - POSTGRES_PASSWORD=crewai
      - POSTGRES_DB=crewai
    volumes:
      - crewai-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewai -d crewai"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # OpenHands needs the host docker socket so it can spawn its own per-task
  # agent-server sandbox containers — that's a meaningful trust boundary
  # (the openhands container effectively has root on the host docker daemon).
  # only run this on a workstation you trust.
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.6
    container_name: openhands
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-state:/.openhands
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=1.15.0-python
      - LOG_ALL_EVENTS=true
      # point OpenHands at the local lemonade endpoint. LiteLLM (used by
      # OpenHands) needs the `openai/` prefix on the model id when talking
      # to a generic OpenAI-compatible server.
      - LLM_BASE_URL=http://lemonade:13305/v1
      - LLM_API_KEY=local
      - LLM_MODEL=openai/Gemma-4-26B-A4B-it-GGUF
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      lemonade:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lemonade-cache:
  open-webui-data:
  agent-tools-home:
  openhands-state:
  crewai-db-data:
