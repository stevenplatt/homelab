                url: https://${TS_DNS_NAME}:8443
              - title: hermes dashboard
                url: https://${TS_DNS_NAME}:9443
                # root 302-redirects to the auth login; probe the
                # unauthenticated status endpoint for health instead
                check-url: https://${TS_DNS_NAME}:9443/api/status
              - title: lm studio api
                url: https://${TS_DNS_NAME}:5443/v1/models
              - title: speedtest tracker
