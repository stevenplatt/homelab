# glance dashboard config — version-controlled here and bind-mounted into
# the glance container by docker-compose.yml. edit, then re-run ../setup.sh
# (or `docker compose restart glance`) to apply.
#
# pages are glance's official preconfigured examples with the homelab
# services integrated:
#   https://github.com/glanceapp/glance/blob/main/docs/preconfigured-pages.md
# the container uses host networking, so all urls are plain localhost —
# valid for both the health checks and clicking through from the browser.
# widget reference: https://github.com/glanceapp/glance/blob/main/docs/configuration.md
server:
  port: 8181

# gruvbox dark theme: https://github.com/glanceapp/glance/blob/main/docs/themes.md#gruvbox-dark
theme:
  background-color: 0 0 16
  primary-color: 43 59 81
  positive-color: 61 66 44
  negative-color: 6 96 59

pages:
  - name: Home
    width: wide
    columns:
      - size: small
        widgets:
          # community widget: https://github.com/glanceapp/community-widgets/blob/main/widgets/random-fact/README.md
          - type: custom-api
            title: Random Fact
            cache: 3h
            url: https://uselessfacts.jsph.pl/api/v2/facts/random
            template: |
              <p class="size-h4 color-paragraph">{{ .JSON.String "text" }}</p>

          - type: calendar
            first-day-of-week: monday

          - type: weather
            location: San Francisco, United States # change to your city
            units: imperial
            hour-format: 12h

          - type: markets
            markets:
              - symbol: VOO
                name: Vanguard S&P 500
              - symbol: SMH
                name: VanEck Semiconductor
              - symbol: GOOD
                name: Google
              - symbol: SPCX
                name: SpaceX

      - size: full
        widgets:
          # collapse-after lives on the widgets inside a group — the group
          # widget itself doesn't support it
          - type: group
            widgets:
              - type: hacker-news
              - type: lobsters

          - type: group
            widgets:
              - type: rss
                title: Reuters
                limit: 10
                feeds:
                  - url: "https://news.google.com/rss/search?q=site:reuters.com&hl=en-US&gl=US&ceid=US:en"
                    title: Reuters
              - type: rss
                title: Engadget
                limit: 10
                feeds:
                  - url: https://www.engadget.com/rss.xml
                    title: Engadget
              - type: rss
                title: Ars Technica
                limit: 10
                feeds:
                  - url: https://feeds.arstechnica.com/arstechnica/index
                    title: Ars Technica

