# glance dashboard config — version-controlled here and bind-mounted into
# the glance container by docker-compose.yml. edit, then re-run ../setup.sh
# (or `docker compose restart glance`) to apply.
#
# pages are glance's official preconfigured examples with the homelab
# services integrated:
#   https://github.com/glanceapp/glance/blob/main/docs/preconfigured-pages.md
# the container uses host networking, so all urls are plain localhost —
# valid for both the health checks and clicking through from the browser.
# widget reference: https://github.com/glanceapp/glance/blob/main/docs/configuration.md
server:
  port: 8181

# gruvbox dark theme: https://github.com/glanceapp/glance/blob/main/docs/themes.md#gruvbox-dark
theme:
  background-color: 0 0 16
  primary-color: 43 59 81
  positive-color: 61 66 44
  negative-color: 6 96 59

pages:
  - name: Startpage
    width: wide
    center-vertically: true
    columns:
      - size: full
        widgets:
          - type: search
            autofocus: true

          # TS_DNS_NAME comes from the container env (set by setup.sh via
          # docker/config/.env) so links work from any tailnet device. urls go
          # through the caddy https proxy — port map in ./Caddyfile (same folder)
          - type: monitor
            cache: 1m
            title: Services
            sites:
              - title: Open WebUI (chat)
                url: https://${TS_DNS_NAME}:8443
              - title: Hermes dashboard
                url: https://${TS_DNS_NAME}:9443
              - title: LM Studio API
                url: https://${TS_DNS_NAME}:5443/v1/models
              - title: Speedtest Tracker
                url: https://${TS_DNS_NAME}:7443

          - type: bookmarks
            groups:
              - title: Homelab
                links:
                  - title: Homelab repo
                    url: https://github.com/stevenplatt/homelab
                    icon: si:github
              - title: General
                links:
                  - title: Gmail
                    url: https://mail.google.com/mail/u/0/
                  - title: Amazon
                    url: https://www.amazon.com/
                  - title: Github
                    url: https://github.com/
              - title: Entertainment
                links:
                  - title: YouTube
                    url: https://www.youtube.com/
                  - title: Prime Video
                    url: https://www.primevideo.com/
                  - title: Disney+
                    url: https://www.disneyplus.com/
              - title: Social
                links:
                  - title: Reddit
                    url: https://www.reddit.com/
                  - title: Twitter
                    url: https://twitter.com/
                  - title: Instagram
                    url: https://www.instagram.com/

  - name: Home
    width: wide
    columns:
      - size: small
        widgets:
          # community widget: https://github.com/glanceapp/community-widgets/blob/main/widgets/random-fact/README.md
          - type: custom-api
            title: Random Fact
            cache: 3h
            url: https://uselessfacts.jsph.pl/api/v2/facts/random
            template: |
              <p class="size-h4 color-paragraph">{{ .JSON.String "text" }}</p>

          - type: calendar
            first-day-of-week: monday

          - type: rss
            limit: 10
            collapse-after: 3
            cache: 12h
            feeds:
              - url: https://selfh.st/rss/
                title: selfh.st
                limit: 4
              - url: https://ciechanow.ski/atom.xml
              - url: https://www.joshwcomeau.com/rss.xml
                title: Josh Comeau
              - url: https://samwho.dev/rss.xml
              - url: https://ishadeed.com/feed.xml
                title: Ahmad Shadeed

      - size: full
        widgets:
          - type: monitor
            title: homelab services
            cache: 1m
            sites:
              - title: open webui (chat)
                url: https://${TS_DNS_NAME}:8443
              - title: hermes dashboard
                url: https://${TS_DNS_NAME}:9443
              - title: lm studio api
                url: https://${TS_DNS_NAME}:5443/v1/models
              - title: speedtest tracker
                url: https://${TS_DNS_NAME}:7443

          - type: group
            widgets:
              - type: hacker-news
              - type: lobsters

          - type: videos
            channels:
              - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
              - UCR-DXc1voovS8nhAvccRZhg # Jeff Geerling
              - UCsBjURrPoezykLs9EqgamOA # Fireship
              - UCBJycsmduvYEL83R_U4JriQ # Marques Brownlee
              - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium

          - type: group
            widgets:
              - type: reddit
                subreddit: technology
                show-thumbnails: true
              - type: reddit
                subreddit: selfhosted
                show-thumbnails: true

      - size: small
        widgets:
          - type: weather
            location: San Francisco, United States # change to your city
            units: imperial
            hour-format: 12h

          - type: bookmarks
            groups:
              - title: homelab
                links:
                  - title: open webui (chat)
                    url: https://${TS_DNS_NAME}:8443
                  - title: hermes dashboard
                    url: https://${TS_DNS_NAME}:9443
                  - title: speedtest tracker
                    url: https://${TS_DNS_NAME}:7443
                  - title: homelab repo
                    url: https://github.com/stevenplatt/homelab

          - type: markets
            markets:
              - symbol: VOO
                name: Vanguard S&P 500
              - symbol: SMH
                name: VanEck Semiconductor
              - symbol: GOOD
                name: Google
              - symbol: SPCX
                name: SpaceX

  - name: Markets
    width: wide
    columns:
      - size: small
        widgets:
          - type: markets
            title: Indices
            markets:
              - symbol: SPY
                name: S&P 500
              - symbol: DX-Y.NYB
                name: Dollar Index

          - type: markets
            title: Crypto
            markets:
              - symbol: BTC-USD
                name: Bitcoin
              - symbol: ETH-USD
                name: Ethereum

          - type: markets
            title: Stocks
            sort-by: absolute-change
            markets:
              - symbol: NVDA
                name: NVIDIA
              - symbol: AAPL
                name: Apple
              - symbol: MSFT
                name: Microsoft
              - symbol: GOOGL
                name: Google
              - symbol: AMD
                name: AMD
              - symbol: RDDT
                name: Reddit
              - symbol: AMZN
                name: Amazon
              - symbol: TSLA
                name: Tesla
              - symbol: INTC
                name: Intel
              - symbol: META
                name: Meta

      - size: full
        widgets:
          - type: group
            widgets:
              - type: reddit
                show-thumbnails: true
                subreddit: technology
              - type: reddit
                show-thumbnails: true
                subreddit: wallstreetbets

          - type: videos
            style: grid-cards
            collapse-after-rows: 3
            channels:
              - UCvSXMi2LebwJEM1s4bz5IBA
              - UCV6KDgJskWaEckne5aPA0aQ
              - UCAzhpt9DmG6PnHXjmJTvRGQ

      - size: small
        widgets:
          # reuters has no native rss — google news site-filtered feeds
          # link directly to reuters.com articles
          - type: rss
            title: News
            limit: 30
            collapse-after: 13
            feeds:
              - url: "https://news.google.com/rss/search?q=site:reuters.com+markets&hl=en-US&gl=US&ceid=US:en"
                title: Reuters Markets
              - url: "https://news.google.com/rss/search?q=site:reuters.com+business&hl=en-US&gl=US&ceid=US:en"
                title: Reuters Business

