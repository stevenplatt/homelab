# web services for the fedora homelab — brought up by ../setup.sh.
# inference is NOT containerized: lm studio runs on the host (systemd user
# service, port 1234), and containers reach it via host.docker.internal.
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # lm studio's openai-compatible endpoint on the host
      - OPENAI_API_BASE_URL=http://host.docker.internal:1234/v1
      - OPENAI_API_KEY=local
      - WEBUI_AUTH=False
      # env vars stay authoritative on every boot — otherwise open-webui
      # persists the first connection it saw (the retired lemonade stack's
      # url survives in the open-webui-data volume) and ignores env changes
      - ENABLE_PERSISTENT_CONFIG=False
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  glance:
    image: glanceapp/glance:latest
    container_name: glance
    # host networking so the monitor widget's urls are valid both for
    # health checks (from the container) and clicks (from the browser).
    # listens on 8181 via server.port in config/glance.yml
    network_mode: host
    volumes:
      # config lives in the repo — edit and re-run setup.sh
      - ./config/glance.yml:/app/config/glance.yml:ro
    env_file:
      # TS_DNS_NAME — written by setup.sh once the tailnet is joined
      # (git-ignored; seeded with localhost before that)
      - path: ./config/.env
        required: false
    restart: unless-stopped

  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    ports:
      - "8765:80"
    volumes:
      - speedtest-data:/config
    environment:
      - PUID=1000
      - PGID=1000
      # pacific time (handles PST/PDT automatically); TZ for the container,
      # APP_TIMEZONE for the laravel app's displayed times and schedule
      - TZ=America/Los_Angeles
      - APP_TIMEZONE=America/Los_Angeles
      - DB_CONNECTION=sqlite
      # laravel encryption key for the local speedtest db — rotate if desired
      - APP_KEY=base64:fBxcn/qHsMDWOHDhy3rkDIUJVIYcFS5ta4SxWXclS4Y=
      - SPEEDTEST_SCHEDULE=0 * * * * # run a speedtest hourly
    env_file:
      # APP_URL (the canonical url behind the caddy https proxy — laravel
      # generates asset links from it) — written by setup.sh
      - path: ./config/.env
        required: false
    restart: unless-stopped

  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    # bridge networking with explicit port publishing so we control exactly
    # which host ports are used. host networking is deliberately avoided: it
    # would make adguard bind 0.0.0.0:53 and collide with fedora's
    # systemd-resolved stub listener (127.0.0.53:53), so the container would
    # refuse to start. tradeoff: bridge NAT means per-client query stats show
    # the docker gateway ip rather than real client ips.
    ports:
      # DNS — bound to this machine's tailscale ip on port 53. tailscale's DNS
      # feature only queries nameservers on 53 (no custom-port option), so this
      # is how the tailnet reaches adguard: add ${TS_IP}:53 as a nameserver at
      # login.tailscale.com/admin/dns. binding the *tailnet* ip specifically
      # does NOT collide with fedora's systemd-resolved, which owns a different
      # ip (127.0.0.53:53) — nothing native is disturbed. TS_IP is written to
      # config/.env by ../setup.sh after the tailnet is joined (passed to
      # compose via --env-file); the 127.0.0.1 fallback keeps a pre-join or
      # plain `docker compose up` off resolved's ip.
      - "${TS_IP:-127.0.0.1}:53:53/tcp"
      - "${TS_IP:-127.0.0.1}:53:53/udp"
      # web admin UI + first-run setup wizard. browse to http://<host>:3000
      # (or over the tailnet via caddy — see config/Caddyfile). in the wizard,
      # set the "Admin Web Interface" port to 3000 so the UI stays here after
      # setup instead of moving to the container's default port 80 (unpublished).
      - "3000:3000/tcp"
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    environment:
      # pacific time (handles PST/PDT automatically) — for the query log
      - TZ=America/Los_Angeles
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy
    # host networking: backends live on host ports / the tailscale ip, and
    # caddy needs tailscaled's socket to fetch .ts.net certificates
    network_mode: host
    volumes:
      # config lives in the repo — edit and re-run setup.sh
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
    env_file:
      # TS_DNS_NAME — written by setup.sh once the tailnet is joined
      - path: ./config/.env
        required: false
    restart: unless-stopped

volumes:
  open-webui-data:
  speedtest-data:
  adguard-work:
  adguard-conf:
  caddy-data:
  caddy-config:
