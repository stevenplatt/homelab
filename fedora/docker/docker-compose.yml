# web services for the fedora homelab — brought up by ../setup.sh.
# inference is NOT containerized: lm studio runs on the host (systemd user
# service, port 1234), and containers reach it via host.docker.internal.
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # lm studio's openai-compatible endpoint on the host
      - OPENAI_API_BASE_URL=http://host.docker.internal:1234/v1
      - OPENAI_API_KEY=local
      - WEBUI_AUTH=False
      # env vars stay authoritative on every boot — otherwise open-webui
      # persists the first connection it saw (the retired lemonade stack's
      # url survives in the open-webui-data volume) and ignores env changes
      - ENABLE_PERSISTENT_CONFIG=False
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  glance:
    image: glanceapp/glance:latest
    container_name: glance
    # host networking so the monitor widget's localhost urls are valid both
    # for health checks (from the container) and clicks (from the browser).
    # listens on 8181 via server.port in glance.yml
    network_mode: host
    volumes:
      # config lives in the repo — edit glance.yml and re-run setup.sh
      - ./glance.yml:/app/config/glance.yml:ro
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      # allow login over plain http (localhost / tailnet)
      - N8N_SECURE_COOKIE=false
    extra_hosts:
      # ai nodes can use the local lm studio endpoint:
      # base url http://host.docker.internal:1234/v1, any api key
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    ports:
      - "8765:80"
    volumes:
      - speedtest-data:/config
    environment:
      - PUID=1000
      - PGID=1000
      - DB_CONNECTION=sqlite
      # laravel encryption key for the local speedtest db — rotate if desired
      - APP_KEY=base64:fBxcn/qHsMDWOHDhy3rkDIUJVIYcFS5ta4SxWXclS4Y=
      - SPEEDTEST_SCHEDULE=0 * * * * # run a speedtest hourly
    restart: unless-stopped

volumes:
  open-webui-data:
  n8n-data:
  speedtest-data:
