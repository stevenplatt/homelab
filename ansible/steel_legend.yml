---

# minimal smoke test — confirms ansible can reach the host and run a task.
# uncomment the plays below once this passes.

- name: smoke test
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: ping
      ansible.builtin.ping:

    - name: confirm ansible is working
      ansible.builtin.debug:
        msg: "ansible reached {{ inventory_hostname }} successfully"

# performs a full configuration of a cleanly installed ubuntu operating system
# targets Ubuntu 26.04 LTS

- name: enable third party repositories
  hosts: localhost
  connection: local
  become: true
  vars:
    kubernetes_version: v1.31
  tasks:
    - name: install prerequisite packages
      apt:
        name:
          - curl
          - flatpak
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
        state: present
        update_cache: true

    - name: ensure /etc/apt/keyrings exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: add flathub flatpak repository
      community.general.flatpak_remote:
        name: flathub
        flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo
        state: present

    - name: fetch google cloud sdk signing key
      get_url:
        url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
        dest: /etc/apt/keyrings/cloud.google.asc
        mode: '0644'
        force: true

    - name: add google cloud sdk repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/cloud.google.asc] https://packages.cloud.google.com/apt cloud-sdk main"
        filename: google-cloud-sdk
        state: present

    - name: fetch hashicorp signing key
      get_url:
        url: https://apt.releases.hashicorp.com/gpg
        dest: /etc/apt/keyrings/hashicorp.asc
        mode: '0644'
        force: true

    - name: add hashicorp (terraform) repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/hashicorp.asc] https://apt.releases.hashicorp.com noble main"
        filename: hashicorp
        state: present

    - name: fetch kubernetes signing key
      get_url:
        url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/deb/Release.key"
        dest: /etc/apt/keyrings/kubernetes.asc
        mode: '0644'
        force: true

    - name: add kubernetes repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes.asc] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/deb/ /"
        filename: kubernetes
        state: present

    - name: fetch helm signing key
      get_url:
        url: https://baltocdn.com/helm/signing.asc
        dest: /etc/apt/keyrings/helm.asc
        mode: '0644'
        force: true

    - name: add helm repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/helm.asc] https://baltocdn.com/helm/stable/debian/ all main"
        filename: helm-stable-debian
        state: present

    - name: update apt cache after adding repositories
      apt:
        update_cache: true

- name: install apt applications
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: install desktop and developer packages
      apt:
        name:
          - snapd
          - gnome-tweaks
          - cmatrix
          - python3-pip
          - python3-venv
          - pipx
          - npm
          - gimp
          - inkscape
          - gnome-boxes
          - gnome-sushi
          - transmission-gtk
          - numix-icon-theme-circle
          - kubectl
          - helm
          - terraform
          - docker.io
          - docker-compose-v2
          - net-tools
          - build-essential
          - zlib1g-dev
          - libssl-dev
          - libncurses-dev
          - libffi-dev
          - libsqlite3-dev
          - libreadline-dev
          - libbz2-dev
          - jq
          - unzip
          - google-cloud-cli
          - google-cloud-cli-app-engine-python
          - google-cloud-cli-app-engine-python-extras
          - google-cloud-cli-app-engine-go
          - google-cloud-cli-bigtable-emulator
          - google-cloud-cli-cbt
          - google-cloud-cli-cloud-build-local
          - google-cloud-cli-datastore-emulator
          - google-cloud-cli-firestore-emulator
          - google-cloud-cli-pubsub-emulator
        state: present

    - name: install yarn globally via npm
      community.general.npm:
        name: yarn
        global: true
        state: present

- name: install aws cli v2
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: check if aws cli is installed
      command: aws --version
      register: aws_cli_check
      failed_when: false
      changed_when: false

    - name: download aws cli v2 installer
      get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: '0644'
      when: aws_cli_check.rc != 0

    - name: unzip aws cli v2 installer
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true
      when: aws_cli_check.rc != 0

    - name: install aws cli v2
      command: /tmp/aws/install
      when: aws_cli_check.rc != 0

    - name: clean up aws cli installer files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/awscliv2.zip
        - /tmp/aws

- name: install flatpak applications
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: application installs
      community.general.flatpak:
        name: "{{ item }}"
        remote: flathub
        state: present
      loop:
        - us.zoom.Zoom
        - com.visualstudio.code
        - com.discordapp.Discord
        - com.valvesoftware.Steam

- name: install third party applications
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: download google chrome deb package
      get_url:
        url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        dest: /tmp/google-chrome-stable_current_amd64.deb
        mode: '0644'

    - name: install google chrome
      apt:
        deb: /tmp/google-chrome-stable_current_amd64.deb
        state: present

    - name: remove google chrome deb package
      file:
        path: /tmp/google-chrome-stable_current_amd64.deb
        state: absent

    - name: download papirus icon theme installer
      get_url:
        url: https://raw.githubusercontent.com/PapirusDevelopmentTeam/papirus-icon-theme/master/install.sh
        dest: /tmp/papirus-install.sh
        mode: '0755'

    - name: install papirus icon theme
      command: /tmp/papirus-install.sh

    - name: remove papirus installer
      file:
        path: /tmp/papirus-install.sh
        state: absent

- name: install kind
  hosts: localhost
  connection: local
  become: true
  vars:
    kind_version: v0.25.0
  tasks:
    - name: check if kind binary is installed
      stat:
        path: /usr/local/bin/kind
      register: kind_binary

    - name: download kind binary
      get_url:
        url: "https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-amd64"
        dest: /usr/local/bin/kind
        mode: '0755'
      when: not kind_binary.stat.exists

- name: install inference snaps
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: install gemma3 inference snap
      community.general.snap:
        name: gemma3
        state: present

    - name: install open-webui snap
      community.general.snap:
        name: open-webui
        state: present

- name: install agentstack and wire up local gemma3 model
  hosts: localhost
  connection: local
  vars:
    gemma3_port: 9090
    gemma3_base_url: "http://127.0.0.1:9090/v1"
  tasks:
    - name: capture target user and home
      set_fact:
        target_home: "{{ ansible_env.HOME }}"

    - name: pin gemma3 http port
      command: "gemma3 set http.port={{ gemma3_port }}"
      changed_when: false

    - name: restart gemma3 snap
      become: true
      command: snap restart gemma3

    - name: wait for gemma3 openai endpoint
      uri:
        url: "{{ gemma3_base_url }}/models"
        status_code: 200
      register: gemma3_models
      retries: 60
      delay: 5
      until: gemma3_models.status == 200

    - name: capture default gemma3 model id
      set_fact:
        gemma3_model_id: "{{ gemma3_models.json.data[0].id }}"

    - name: check if agentstack is installed
      command: which agentstack
      register: agentstack_check
      failed_when: false
      changed_when: false

    - name: install agentstack
      shell: 'sh -c "$(curl -LsSf https://agentstack.beeai.dev/install.sh)"'
      when: agentstack_check.rc != 0

    - name: register gemma3 as agentstack llm provider
      shell: |
        export PATH="{{ target_home }}/.local/bin:$PATH"
        agentstack model add llm \
          --provider openai \
          --base-url {{ gemma3_base_url }} \
          --api-key local \
          --model "{{ gemma3_model_id }}" \
          --yes
      register: agentstack_model_add
      changed_when: agentstack_model_add.rc == 0
      failed_when: false

- name: reboot system
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: reboot
      reboot:
