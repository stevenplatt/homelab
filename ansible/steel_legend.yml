---

# minimal smoke test — confirms ansible can reach the host and run a task.
# uncomment the plays below once this passes.

- name: smoke test
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: ping
      ansible.builtin.ping:

    - name: confirm ansible is working
      ansible.builtin.debug:
        msg: "ansible reached {{ inventory_hostname }} successfully"

- name: ensure github ssh key exists
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: set ssh key path
      set_fact:
        ssh_key_path: "{{ ansible_facts.env.HOME }}/.ssh/id_ed25519"

    - name: ensure ~/.ssh directory exists
      file:
        path: "{{ ansible_facts.env.HOME }}/.ssh"
        state: directory
        mode: '0700'

    - name: generate ed25519 ssh key if missing
      command: ssh-keygen -t ed25519 -f {{ ssh_key_path }} -N "" -C "{{ ansible_facts.env.USER }}@{{ ansible_facts.hostname }}"
      args:
        creates: "{{ ssh_key_path }}"

    - name: add key to running ssh-agent (best effort — requires SSH_AUTH_SOCK)
      command: ssh-add "{{ ssh_key_path }}"
      register: ssh_add_result
      failed_when: false
      changed_when: ssh_add_result.rc == 0

    - name: read public key
      slurp:
        src: "{{ ssh_key_path }}.pub"
      register: ssh_public_key

    - name: display public key for copy to github
      debug:
        msg: |
          ================================================================
          copy the following public key into your github account:
          https://github.com/settings/keys
          ----------------------------------------------------------------
          {{ ssh_public_key.content | b64decode }}
          ================================================================

- name: configure git user identity
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: check current git user.name
      command: git config --global --get user.name
      register: git_name_check
      failed_when: false
      changed_when: false

    - name: check current git user.email
      command: git config --global --get user.email
      register: git_email_check
      failed_when: false
      changed_when: false

    - name: prompt for git user.name
      pause:
        prompt: "enter git user.name"
      register: git_name_input
      when: git_name_check.rc != 0 or (git_name_check.stdout | trim) == ""

    - name: prompt for git user.email
      pause:
        prompt: "enter git user.email"
      register: git_email_input
      when: git_email_check.rc != 0 or (git_email_check.stdout | trim) == ""

    - name: set git user.name
      command: git config --global user.name "{{ git_name_input.user_input | trim }}"
      when:
        - git_name_input is not skipped
        - (git_name_input.user_input | trim) != ""

    - name: set git user.email
      command: git config --global user.email "{{ git_email_input.user_input | trim }}"
      when:
        - git_email_input is not skipped
        - (git_email_input.user_input | trim) != ""

# performs a full configuration of a cleanly installed ubuntu operating system
# targets Ubuntu 26.04 LTS

- name: enable third party repositories
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: install prerequisite packages
      apt:
        name:
          - curl
          - flatpak
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
        state: present
        update_cache: true

    - name: ensure /etc/apt/keyrings exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: add flathub flatpak repository
      community.general.flatpak_remote:
        name: flathub
        flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo
        state: present

    - name: fetch google cloud sdk signing key
      get_url:
        url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
        dest: /etc/apt/keyrings/cloud.google.asc
        mode: '0644'
        force: true

    - name: add google cloud sdk repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/cloud.google.asc] https://packages.cloud.google.com/apt cloud-sdk main"
        filename: google-cloud-sdk
        state: present

    - name: update apt cache after adding repositories
      apt:
        update_cache: true

- name: install apt applications
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: install desktop and developer packages
      apt:
        name:
          - snapd
          - python3-pip
          - python3-venv
          - pipx
          - npm
          - docker.io
          - docker-compose-v2
          - net-tools
          - build-essential
          - zlib1g-dev
          - libssl-dev
          - libncurses-dev
          - libffi-dev
          - libsqlite3-dev
          - libreadline-dev
          - libbz2-dev
          - jq
          - unzip
          - google-cloud-cli
          - google-cloud-cli-app-engine-python
          - google-cloud-cli-app-engine-python-extras
          - google-cloud-cli-app-engine-go
          - google-cloud-cli-bigtable-emulator
          - google-cloud-cli-cbt
          - google-cloud-cli-cloud-build-local
          - google-cloud-cli-datastore-emulator
          - google-cloud-cli-firestore-emulator
          - google-cloud-cli-pubsub-emulator
        state: present

    - name: install yarn globally via npm
      community.general.npm:
        name: yarn
        global: true
        state: present

- name: install aws cli v2
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: check if aws cli is installed
      command: aws --version
      register: aws_cli_check
      failed_when: false
      changed_when: false

    - name: download aws cli v2 installer
      get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: '0644'
      when: aws_cli_check.rc != 0

    - name: unzip aws cli v2 installer
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true
      when: aws_cli_check.rc != 0

    - name: install aws cli v2
      command: /tmp/aws/install
      when: aws_cli_check.rc != 0

    - name: clean up aws cli installer files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/awscliv2.zip
        - /tmp/aws

- name: install linux homebrew
  hosts: localhost
  connection: local
  tasks:
    - name: check if homebrew is installed
      stat:
        path: /home/linuxbrew/.linuxbrew/bin/brew
      register: brew_binary

    - name: install homebrew prerequisites
      become: true
      apt:
        name:
          - build-essential
          - procps
          - file
          - git
        state: present
      when: not brew_binary.stat.exists

    - name: install homebrew non-interactively
      shell: NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not brew_binary.stat.exists

    - name: ensure brew shellenv is sourced in ~/.bashrc
      lineinfile:
        path: "{{ ansible_facts.env.HOME }}/.bashrc"
        line: 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"'
        state: present

- name: install homebrew packages
  hosts: localhost
  connection: local
  tasks:
    - name: install mkcert via homebrew
      community.general.homebrew:
        name: mkcert
        state: present
        path: /home/linuxbrew/.linuxbrew/bin

- name: install flatpak applications
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: application installs
      community.general.flatpak:
        name: "{{ item }}"
        remote: flathub
        state: present
      loop:
      # required to avoid conflict with inference snap gpu configs
        - com.valvesoftware.Steam

- name: install third party applications
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: download google chrome deb package
      get_url:
        url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        dest: /tmp/google-chrome-stable_current_amd64.deb
        mode: '0644'

    - name: install google chrome
      apt:
        deb: /tmp/google-chrome-stable_current_amd64.deb
        state: present

    - name: remove google chrome deb package
      file:
        path: /tmp/google-chrome-stable_current_amd64.deb
        state: absent

- name: install desktop snaps
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: install classic-confinement desktop snaps
      community.general.snap:
        name:
          - slack
          - code
        classic: true
        state: present

    - name: install strict-confinement desktop snaps
      community.general.snap:
        name:
          - zoom-client
          - discord
        state: present

- name: install devops tooling
  hosts: localhost
  connection: local
  become: true
  vars:
    kind_version: v0.25.0
  tasks:
    - name: install classic-confinement devops snaps
      community.general.snap:
        name:
          - kubectl
          - helm
          - terraform
        classic: true
        state: present

    - name: check if kind binary is installed
      stat:
        path: /usr/local/bin/kind
      register: kind_binary

    - name: download kind binary
      get_url:
        url: "https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-amd64"
        dest: /usr/local/bin/kind
        mode: '0755'
      when: not kind_binary.stat.exists

- name: docker host setup for vllm and gpu passthrough
  hosts: localhost
  connection: local
  tasks:
    - name: capture target user
      set_fact:
        target_user: "{{ ansible_facts.env.SUDO_USER | default(ansible_facts.user_id, true) }}"

    - name: fail if target user resolved to root
      fail:
        msg: "target_user resolved to root — run the playbook as your normal user (with passwordless sudo) or with `sudo -E -u <user>`, not as root directly."
      when: target_user == "root"

    - name: install rocm-smi for amd gpu diagnostics
      become: true
      apt:
        name:
          - rocm-smi
          - rocminfo
        state: present
      failed_when: false

    - name: ensure gpu access groups exist
      become: true
      group:
        name: "{{ item }}"
        state: present
      loop:
        - render
        - video

    - name: add user to docker, render, video groups
      become: true
      user:
        name: "{{ target_user }}"
        groups: docker,render,video
        append: true

    - name: enable and start docker stack at boot
      become: true
      systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - containerd.service
        - docker.socket
        - docker.service
